services:
  xui-im:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: xui-im_app
    # hostname: yourhostname <- optional
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    # For Linux: you can use `network_mode: host` instead of ports.
    # For Mac/Windows (Docker Desktop), keep published ports.
    ports:
      - "2053:2053"   # Panel web UI
      - "2096:2096"   # Subscription server (if enabled)
    restart: unless-stopped
