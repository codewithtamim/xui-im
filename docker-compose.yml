services:
  3xui:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: 3xui_app
    # hostname: yourhostname <- optional
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    # For Linux (default): use host network
    # network_mode: host
    # For Mac/Windows (Docker Desktop): comment out network_mode above and uncomment ports below
    ports:
      - "2053:2053"   # Panel web UI
      - "2096:2096"   # Subscription server (if enabled)
    restart: unless-stopped
