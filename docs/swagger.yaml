basePath: /
definitions:
  controller.createApiKeyForm:
    properties:
      description:
        type: string
      expiryTime:
        type: integer
    required:
    - description
    type: object
  entity.Msg:
    properties:
      msg:
        description: Response message text
        type: string
      obj:
        description: Optional data object
      success:
        description: Indicates if the operation was successful
        type: boolean
    type: object
info:
  contact:
    name: 3X-UI
  description: API for managing the 3X-UI panel including inbounds, server, and settings.
  license:
    name: GPL-3.0
  title: 3X-UI Panel API
  version: "2.0"
paths:
  /panel/api/inbounds/{id}/delClient/{clientId}:
    post:
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Msg'
      security:
      - ApiKeyAuth: []
      summary: Delete client from inbound
      tags:
      - Inbound
  /panel/api/inbounds/{id}/resetClientTraffic/{email}:
